<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Agent Dashboard</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }

      body {
        background: #e2e7eb;
      }

      .main-panel {
        display: grid;
        grid-template-columns: 250px 1fr;
        grid-template-rows: 60px 1fr;
        grid-template-areas:
          'sidebar header'
          'sidebar Right-panel';
        height: 100vh;
        gap: 3px;
      }

      .sidebar {
        grid-area: sidebar;
        background: white;
        color: black;
      }

      .user-profile {
        margin: 20px;
        padding: 20px;
        border-radius: 20px;
      }

      img {
        width: 180px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
      }

      .Agent-options {
        font-size: larger;
        padding-top: 40px;
        margin: 10px;
      }

      .Agent-options a {
        text-decoration: none;
        color: black;
      }

      ul {
        list-style: none;
      }

      li {
        padding: 15px;
        box-sizing: border-box;
        margin: 10px 0;
        text-align: left;
        border-bottom: 1px solid rgba(63, 61, 61, 0.2);
        border-radius: 10px;
        cursor: pointer;
      }

      .Agent-options li a {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .Agent-options li.active {
        background-color: rgb(227, 226, 223);
      }

      li:hover {
        background-color: rgb(185, 184, 182);
      }

      header {
        grid-area: header;
        background: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
        border-bottom: 1px solid #ddd;
      }

      #search {
        border: 2.5px solid rgb(128, 209, 143);
        padding: 5px;
        border-radius: 5px;
        width: 25%;
      }

      .Right-panel {
        grid-area: Right-panel;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
        gap: 20px;
        border-radius: 10px;
        margin: 5%;
        align-content: start;
      }

      /* ── Card styling ── */
      .Panel-1 {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
        padding-bottom: 14px;
        border-bottom: 1px solid #eee;
      }

      .card-icon {
        font-size: 26px !important;
        padding: 10px;
        border-radius: 12px;
      }

      .card-label {
        font-size: 1.05rem;
        font-weight: 700;
        color: #1e1e2f;
      }

      .parameters {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        gap: 6px;
        row-gap: 12px;
      }

      .param-label {
        font-size: 0.95rem;
        color: #555;
        font-weight: 600;
      }

      .param-value {
        font-size: 2rem;
        font-weight: 800;
        text-align: right;
        color: #1e1e2f;
      }

      .param-value.green {
        color: #2e7d32;
      }

      .updated {
        margin-top: 18px;
        color: #aaa;
        font-size: 0.78rem;
        text-align: right;
      }

      /* ── Header user widget ── */
      .user-header {
        display: flex;
        border-radius: 25px;
        padding: 8px 14px;
        gap: 20px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        align-items: center;
      }

      .Avatar {
        background-color: #1e1e2f;
        color: white;
        padding: 5px 8px;
        border-radius: 20px;
        font-size: larger;
      }

      .user-info {
        display: block;
      }

      .user-role {
        font-size: 12px;
        color: gray;
      }
    </style>
  </head>
  <body>
    <div class="main-panel">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="user-profile">
          <img src="Karibu-logo.png" alt="Karibu Logo" />
        </div>

        <div class="Agent-options">
          <ul>
            <li class="active">
              <a href="Karibu_Sales_Agent_DashBoard.html">
                <span class="material-icons">dashboard</span>Main DashBoard
              </a>
            </li>
            <li>
              <a href="Karibu_Sales_Agent_Cash-Sales.html">
                <span class="material-icons">payments</span>Cash Sales
              </a>
            </li>
            <li>
              <a href="Karibu_Sales_Agent_CreditSales.html">
                <span class="material-icons">credit_card</span>Credit Sales
              </a>
            </li>
            <li>
              <a href="index.html">
                <span class="material-icons">logout</span>Log Out
              </a>
            </li>
          </ul>
        </div>
      </aside>

      <!-- Header -->
      <header>
        <h2>Dashboard</h2>
        <input type="text" id="search" placeholder="Search items" />
        <div class="user-header">
          <div class="Avatar" id="avatar-initials">--</div>
          <div class="user-info">
            <h5 id="employee-name"></h5>
            <div class="user-role">Sales Agent</div>
          </div>
        </div>
      </header>

      <!-- Cards -->
      <main class="Right-panel">
        <!-- Cash Sales Card -->
        <div class="Panel-1">
          <div class="card-header">
            <span
              class="material-icons card-icon"
              style="background: #e8f5e9; color: #2e7d32"
              >payments</span
            >
            <span class="card-label">Cash Sales Today</span>
          </div>
          <div class="parameters">
            <span class="param-label">Transactions</span>
            <span class="param-value green" id="cash">—</span>

            <span class="param-label">UGX Total</span>
            <span class="param-value green" id="ugx_cash">—</span>
          </div>
          <p class="updated">Last updated: <span id="today"></span></p>
        </div>

        <!-- Credit Sales Card -->
        <div class="Panel-1">
          <div class="card-header">
            <span
              class="material-icons card-icon"
              style="background: #fff3e0; color: #e65100"
              >credit_card</span
            >
            <span class="card-label">Credit Sales Today</span>
          </div>
          <div class="parameters">
            <span class="param-label">Transactions</span>
            <span class="param-value" style="color: #e65100" id="credit"
              >—</span
            >

            <span class="param-label">UGX Total</span>
            <span class="param-value" style="color: #e65100" id="ugx_credit"
              >—</span
            >
          </div>
          <p class="updated">Last updated: <span id="today2"></span></p>
        </div>
      </main>
    </div>

    <script>
      const cashArea = document.querySelector('#cash');
      const creditArea = document.querySelector('#credit');
      const ugxCredit = document.querySelector('#ugx_credit');
      const ugxCash = document.querySelector('#ugx_cash');
      const employeeName = document.querySelector('#employee-name');
      const avatarEl = document.querySelector('#avatar-initials');

      const token = localStorage.getItem('token');
      const API_URL = 'http://localhost:3000';
      let agentBranch = '';

      // Set both date stamps
      const dateStr = new Date().toLocaleDateString();
      document.querySelector('#today').textContent = dateStr;
      document.querySelector('#today2').textContent = dateStr;

      /* ── Profile (reads from JWT token) ── */
      function profile() {
        if (!token) {
          alert('Not logged in');
          window.location.href = 'index.html';
          return;
        }

        const payload = JSON.parse(atob(token.split('.')[1]));

        // Display name and initials
        employeeName.textContent = payload.firstName + ' ' + payload.lastName;
        avatarEl.textContent = (
          payload.firstName[0] + payload.lastName[0]
        ).toUpperCase();

        // Set branch globally before loading counts
        agentBranch = payload.branch;

        RegularSales_Count();
        Credit_Count();
      }
      profile();

      /* ── Cash sales count (today, this branch) ── */
      async function RegularSales_Count() {
        try {
          const response = await fetch(`${API_URL}/api/cashsales`, {
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
          });
          const result = await response.json();

          const today = new Date().toDateString();
          let cashCounter = 0;
          let totalSales = 0;

          result.data
            .filter((sale) => sale.Branch === agentBranch)
            .forEach((sale) => {
              if (new Date(sale.createdAt).toDateString() === today) {
                totalSales++;
                if (sale.Amount_paid) cashCounter += sale.Amount_paid;
              }
            });

          ugxCash.textContent = cashCounter.toLocaleString();
          cashArea.textContent = totalSales;
        } catch (err) {
          console.error('Failed to load cash sales:', err);
          cashArea.textContent = 'Err';
          ugxCash.textContent = 'Err';
        }
      }

      /* ── Credit sales count (today, this branch) ── */
      async function Credit_Count() {
        try {
          const response = await fetch(`${API_URL}/api/creditsales`, {
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
          });
          const result = await response.json();

          const today = new Date().toDateString();
          let creditCounter = 0;
          let totalCredit = 0;

          result.data
            .filter((sale) => sale.Branch === agentBranch)
            .forEach((sale) => {
              if (new Date(sale.createdAt).toDateString() === today) {
                totalCredit++;
                if (sale.Amount_Due) creditCounter += sale.Amount_Due;
              }
            });

          ugxCredit.textContent = creditCounter.toLocaleString();
          creditArea.textContent = totalCredit;
        } catch (err) {
          console.error('Failed to load credit sales:', err);
          creditArea.textContent = 'Err';
          ugxCredit.textContent = 'Err';
        }
      }
    </script>
  </body>
</html>
