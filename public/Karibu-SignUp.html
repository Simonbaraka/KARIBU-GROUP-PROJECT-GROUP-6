<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - Karibu</title>

    <style>
      /* General Reset & Body Styling */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #e2e7eb;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      /* Main form container styling */
      .main-panel {
        background: white;
        width: 100%;
        max-width: 520px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        padding: 40px;
      }

      /* Logo */
      .logo-container {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }
      img {
        border-radius: 50%;
        width: 120px;
        height: 120px;
        object-fit: cover;
      }

      /* Heading */
      h1 {
        text-align: center;
        color: #1e1e2f;
        margin-bottom: 25px;
        font-size: 1.7rem;
      }

      /* Form layout */
      .user-details {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .input-box {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .input-box label {
        font-size: 0.95rem;
        font-weight: 600;
        color: #333;
      }
      .input-box input,
      .input-box select {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
        background: #f8f9fa;
      }
      .input-box input:focus,
      .input-box select:focus {
        outline: none;
        border-color: #1e1e2f;
        background: white;
      }

      /* Buttons & Links */
      .button-section {
        margin-top: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      button {
        padding: 12px;
        background: #1e1e2f;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        background: #2a2a3f;
      }
      .links {
        text-align: center;
      }
      .links a {
        color: #1e1e2f;
        text-decoration: none;
        font-size: 0.9rem;
      }
      .links a:hover {
        text-decoration: underline;
      }

      /* Success & error message styling */
      .message {
        font-size: 0.9rem;
        text-align: center;
        margin-top: 8px;
        display: none;
      }
      .error {
        color: red;
      }
      .success {
        color: green;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .main-panel {
          padding: 25px 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="main-panel">
      <form id="signupForm">
        <!-- Logo -->
        <div class="logo-container">
          <img src="Karibu-logo.png" alt="Karibu Logo" />
        </div>

        <h1>Create Account</h1>

        <div class="user-details">
          <!-- First Name -->
          <div class="input-box">
            <label for="fname">First Name</label>
            <input type="text" id="fname" required />
          </div>

          <!-- Last Name -->
          <div class="input-box">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" required />
          </div>

          <!-- Email -->
          <div class="input-box">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>

          <!-- Role -->
          <div class="input-box">
            <label for="role">Role</label>
            <select id="role" required>
              <option value="">Select role</option>
              <option value="Director">Director</option>
              <option value="Manager">Manager</option>
              <option value="Sales Agent">Sales Agent</option>
            </select>
          </div>

          <!-- Branch -->
          <div class="input-box">
            <label for="branch">Karibu Branch</label>
            <select id="branch" required>
              <option value="">Select Branch</option>
              <option value="Maganjo">Maganjo</option>
              <option value="Matugga">Matugga</option>
            </select>
          </div>

          <!-- Password -->
          <div class="input-box">
            <label for="password">Password</label>
            <input type="password" id="password" required />
          </div>

          <!-- Confirm Password -->
          <div class="input-box">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" required />
          </div>

          <!-- Inline messages for validation -->
          <div class="message error" id="errorMessage"></div>
          <div class="message success" id="successMessage"></div>

          <!-- Buttons -->
          <div class="button-section">
            <button type="submit" id="submitBtn">Create Account</button>
            <div class="links">
              <a href="index.html">Already have an account? Login</a>
            </div>
          </div>
        </div>
      </form>
    </div>

    <script>
      const form = document.getElementById('signupForm');
      const API_URL = 'http://localhost:3000';
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const submitBtn = document.getElementById('submitBtn');
      const role = document.getElementById('role');

      // Function to fetch total Sales Agents
      const response = await fetch(`${API_URL}/api/users`);
      const result = await response.json();
      async function getSalesAgentCount() {
        try {

          if (!result.data) return 0;
          return result.data.filter((user) => user.Role === 'Sales Agent')
            .length;

        } catch (err) {
          console.error('Error fetching users:', err);
          return 0;
        }
      }

      async function  getManagerCount() {
        try{
          if(!result.data) return 0;
          return result.data.forEach(manager => manager.Role==="Manager").length;

        }catch(err){
          console.error('Error fetching users:', err);
          return 0;}

      }

      // Listen for form submission
      form.addEventListener('submit', async (e) => {
        e.preventDefault(); // prevent default form submission
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';
        submitBtn.disabled = true; // prevent double submission

        // Get input values
        const fname = document.getElementById('fname').value.trim();
        const lname = document.getElementById('lname').value.trim();
        const email = document
          .getElementById('email')
          .value.trim()
          .toLowerCase();
        const role = document.getElementById('role').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const branch = document.getElementById('branch').value;

        // Client-side validation
        if (!fname || !lname || !email || !role || !password || !confirm) {
          errorMessage.textContent = 'All fields are required.';
          errorMessage.style.display = 'block';
          submitBtn.disabled = false;
          return;
        }

        if (password.length < 6) {
          errorMessage.textContent = 'Password must be at least 6 characters.';
          errorMessage.style.display = 'block';
          submitBtn.disabled = false;
          return;
        }

        if (password !== confirm) {
          errorMessage.textContent = 'Passwords do not match.';
          errorMessage.style.display = 'block';
          submitBtn.disabled = false;
          return;
        }

        // Prepare user object to send to backend
        const user = {
          FirstName: fname,
          LastName: lname,
          Email: email,
          Role: role,
          Password: password,
          Branch: branch,
        };

        try {
          // Send POST request to backend API
          const response = await fetch(`${API_URL}/api/users/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(user),
          });

          //Checks if there are more than 2 sales agent per branch

          const result = await response.json();
          console.log('RESULT OF USER: ', result);

          const counter = await getSalesAgentCount();
          const managerCounter = await getManagerCount()

          if (role === 'Sales Agent' && counter > 2) {
            errorMessage.textContent =
              'Contact Director For Clearance: Max 2 Sales Agents';
            errorMessage.style.color = 'red';
            errorMessage.style.display = 'block';
            submitBtn.disabled = false;
            return;
          }else if (role==="Manager" && managerCounter>2){
             errorMessage.textContent =
              'Contact Director For Clearance: Max 2 Managers';
            errorMessage.style.color = 'red';
            errorMessage.style.display = 'block';
            submitBtn.disabled = false;
          }

          // Handle backend response
          if (response.ok) {
            successMessage.textContent = '✅ Account created successfully!';
            successMessage.style.display = 'block';
            form.reset();

            // Redirect to login page after 2 seconds
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 2000);
          } else {
            errorMessage.textContent = '❌ ' + result.message;
            errorMessage.style.display = 'block';
          }
        } catch (error) {
          console.error('Network error:', error);
          errorMessage.textContent =
            '❌ Cannot connect to server. Try again later.';
          errorMessage.style.display = 'block';
        } finally {
          submitBtn.disabled = false; // re-enable submit button
        }
      });
    </script>
  </body>
</html>
