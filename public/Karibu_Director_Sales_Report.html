<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Director Sales Report</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }

      body {
        background: #e2e7eb;
      }

      .main-panel {
        display: grid;
        grid-template-columns: 250px 1fr;
        grid-template-rows: 60px 1fr;
        grid-template-areas:
          'sidebar header'
          'sidebar Right-panel';
        height: 100vh;
        gap: 3px;
      }

      .sidebar {
        grid-area: sidebar;
        background-color: white;
        color: black;
      }

      .user-profile {
        margin: 20px;
        padding: 20px;
        border-radius: 20px;
        padding: 20px;
      }

      img {
        width: 180px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
      }

      .Director-Options {
        margin-top: 20px;
      }

      ul {
        list-style: none;
        margin-top: 50px;
      }

      li {
        padding: 15px;
        box-sizing: border-box;
        margin: 10px 0; /* Only vertical margin between items */
        text-align: left;
        border-bottom: 1px solid rgba(63, 61, 61, 0.2);
        cursor: pointer;
        border-radius: 10px;
        margin: 10px;
        font-size: large;
      }

      .Director-Options li a {
        display: flex;
        gap: 14px;
        align-items: center;
      }
      li:hover {
        background-color: rgb(185, 184, 182);
      }

      li.active {
        background-color: rgb(227, 226, 223);
      }

      .sidebar a {
        text-decoration: none;
        color: black;
      }

      header {
        grid-area: header;
        background: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px 20px;
        border-bottom: 1px solid #ddd;
      }

      #search {
        border: 2.5px solid rgb(128, 209, 143);
        padding: 5px;
        border-radius: 5px;
        width: 25%;
      }

      .Right-panel {
        grid-area: Right-panel;
        display: grid;
        grid-template-columns: repeat(1, minmax(400px, 1fr));
        border-radius: 10px;
        margin: 5%;
      }

      .user-details {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
        padding: 20px;
        align-items: end;
        background-color: white;
        border: 1px solid#1e1e2f;
        border-radius: 5px;
      }
      .input-box {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .input-box input {
        padding: 5px;
        border-radius: 5px;
        border: 1px solid #ddd;
        background-color: #f8f9fa;
      }

      .input-box select {
        padding: 5px;
        border-radius: 5px;
        border: 1px solid #ddd;
        background-color: #f8f9fa;
      }

      .input-box label {
        font-size: 20px;
      }

      .input-box button {
        background: #1e1e2f;
        color: white;
        border-radius: 5px;
        padding: 7px;
        height: 36px;
        cursor: pointer;
      }

      form h2 {
        text-align: center;
        margin-top: 35px;
      }

      button {
        background-color: #1e1e2f;
        color: white;
        margin-left: 20px;
        border-radius: 3px;
        padding: 7px;
      }

      #salesTable {
        width: 100%;
        border-collapse: collapse;
        border-radius: 12px;
        overflow: hidden;
        margin-top: 10px;
      }

      th {
        background: #34435c;
        text-align: left;
        padding: 15px;
        color: white;
        overflow: hidden;
      }
      td {
        text-align: left;
        padding: 10px;
        font-size: 14px;
        border-bottom: 1px solid #eee;
        background: white;
      }

      tbody tr:hover {
        background-color: #f5f7fa;
      }

      .user-header {
        display: flex;
        border-radius: 25px;
        padding: 8px 14px;
        gap: 20px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        align-items: center;
      }

      .Avatar {
        background-color: #1e1e2f;
        color: white;
        padding: 5px;
        border-radius: 20px;
        font-size: larger;
      }

      .user-info {
        display: block;
        align-items: center;
      }

      .user-name {
        font: 30px;
      }

      .user-role {
        font-size: 12px;
        color: gray;
      }
    </style>
  </head>
  <body>
    <div class="main-panel">
      <!--left side-->
      <div class="sidebar">
        <!--userprofile-->
        <div class="user-profile">
          <img src="Karibu-logo.png" alt="Username" />
        </div>

        <!--Manager options-->
        <div class="Director-Options">
          <ul>
            <li>
              <a href="Karibu_Director_DashBoard.html">
                <div class="material-icons">dashboard</div>
                Main DashBoard</a
              >
            </li>
            <li class="active">
              <a href="Karibu_Director_Sales_Report.html"
                ><div class="material-icons">bar_chart</div>
                Sales Report</a
              >
            </li>
            <li>
              <a href="Karibu_Director_Sales_Summaries.html">
                <div class="material-icons">summarize</div>
                Sales Summaries</a
              >
            </li>

            <li>
              <a href="Karibu_Employee.html">
                <div class="material-icons">group</div>
                Employees</a
              >
            </li>
          </ul>
        </div>
      </div>

      <header>
        <h2>Sales Report</h2>
        <input type="text" id="search" placeholder="search items" />
        <div class="user-header">
          <div class="Avatar">SB</div>
          <div class="user-info">
            <div class="user-name">
              <h5>Simon</h5>
            </div>
            <div class="user-role">Director</div>
          </div>
        </div>
      </header>
      <!--Right panel-->
      <div class="Right-panel">
        <form>
          <div class="user-details">
            <div class="input-box">
              <label for="ReportType">Report Type</label>
              <select id="ReportType">
                <option>Select Report</option>
                <option>Cash</option>
                <option>Credit</option>
              </select>
            </div>

            <div class="input-box">
              <label for="Branch">Karibu Branch</label>
              <select id="Branch">
                <option>Select branch</option>
                <option>Kampala</option>
                <option>Entebbe</option>
              </select>
            </div>

            <div class="input-box">
              <label for="start">Start Date</label>
              <input type="date" id="start" />
            </div>

            <div class="input-box">
              <label for="end">End Date</label>
              <input type="date" id="end" />
            </div>

            <div class="input-box">
              <button type="button" onclick="Load_Report()">
                Generate Report
              </button>
            </div>
          </div>

          <h2>Report is displayed here</h2>
          <table id="salesTable">
            <thead>
              <tr>
                <th>No.</th>
                <th>Date</th>
                <th>Customer</th>
                <th>Agent</th>
                <th>Produce</th>
                <th>Branch</th>
                <th>Tonnage</th>
                <th>Selling Price</th>
              </tr>
            </thead>
            <tbody>
              <!-- Data inserted dynamically -->
            </tbody>
          </table>
        </form>
      </div>
    </div>

    <script>
      const API_URL = 'http://localhost:3000';
      const tablebody = document.querySelector('#salesTable tbody');

      async function Load_Report() {
        try {
          const startDate = document.querySelector('#start').value;
          const endDate = document.querySelector('#end').value;
          const branch = document.querySelector('#Branch').value;
          const ReportType = document.querySelector('#ReportType');

          let url = `${API_URL}/api/reports/sales-report`;
          const params = new URLSearchParams();

          if (startDate) params.append('startDate', startDate);
          if (endDate) params.append('endDate', endDate);
          if (branch && branch !== 'Select Branch') {
            params.append('Branch', branch);
          }

          if (params.toString()) {
            url += `?${params.toString()}`;
          }

          console.log('Fetching:', url);

          const response = await fetch(url);
          const result = await response.json();
          console.log(result);
          let table_ = '';

          result.data.forEach((sale, index) => {
            table_ += `
            <tr>
                    <td>${index + 1}</td>
                    <td>${new Date(sale.createdAt).toISOString().split('T')[0]}</td>
                    <td>${sale.Buyer_name || '-'}</td>
                    <td>${sale.Agent_name || '-'}</td>
                    <td>${sale.Produce_name || '-'}</td>
                    <td>${sale.Branch || '-'}</td>
                    <td>${(sale.Tonnage || 0).toLocaleString()}</td>
                    <td>${(sale.Amount_paid || 0).toLocaleString()}</td>
            </tr>`;
          });

          tablebody.innerHTML = table_;
        } catch (error) {
          console.error('Error loading report:', error);
        }
      }
    </script>
  </body>
</html>
