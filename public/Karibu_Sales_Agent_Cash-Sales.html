<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regular Sales</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }

      body {
        background: #e2e7eb;
      }

      .main-panel {
        display: grid;
        grid-template-columns: 250px 1fr;
        grid-template-rows: 60px 1fr;
        grid-template-areas:
          'sidebar header'
          'sidebar Right-panel';
        height: 100vh;
        gap: 3px;
      }

      .sidebar {
        grid-area: sidebar;
        background: white;
        color: black;
      }

      .user-profile {
        margin: 20px;
        padding: 20px;
        border-radius: 20px;
      }

      img {
        width: 180px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
      }

      .Agent-options {
        padding-top: 40px;
        margin: 10px;
      }

      .Agent-options a {
        text-decoration: none;
        color: black;
      }

      ul {
        list-style: none;
        margin: 0; /* Remove all margins */
        padding: 0; /* Remove all padding */
        width: 100%;
      }

      li {
        padding: 15px;
        width: 100%;
        box-sizing: border-box;
        margin: 10px 0; /* Only vertical margin between items */
        text-align: left;
        border-bottom: 1px solid rgba(63, 61, 61, 0.2);
        border-radius: 10px;
        font-size: large;
        cursor: pointer;
      }

      .Agent-options li a {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .Agent-options li.active {
        background-color: rgb(227, 226, 223);
      }
      li:hover {
        background-color: rgb(185, 184, 182);
      }

      header {
        grid-area: header;
        background: white;
        display: flex;
        justify-content: space-between;
        align-items: center;

        border-bottom: 1px solid #ddd;
      }

      #search {
        border: 2.5px solid rgb(128, 209, 143);
        padding: 5px;
        border-radius: 5px;
        width: 25%;
      }

      .Right-panel {
        grid-area: Right-panel;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
        border-radius: 10px;
        margin: 5%;
      }

      .user-details {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        background-color: rgba(255, 255, 255, 0.808);
        padding: 50px 50px;
        border-radius: 5px;
      }

      .input-box {
        margin: 20px 0 12px 0;
      }

      .input-box input {
        height: 45px;
        width: 100%;
        border-radius: 5px;
        border: 1px solid #ddd;
        background-color: #f8f9fa;
      }

      .input-box select {
        height: 45px;
        width: 100%;
        border-radius: 5px;
        border: 1px solid #ddd;
        background-color: #f8f9fa;
      }

      label {
        font-weight: 500;
        margin-bottom: 5px;
        font-size: 20px;
      }

      button {
        margin: 20px 30px;
        padding: 10px 20px;
        background: #1e1e2f;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #1e1e2f;
      }

      .user-header {
        display: flex;
        border-radius: 25px;
        padding: 8px 14px;
        gap: 20px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        align-items: center;
      }

      .Avatar {
        background-color: #1e1e2f;
        color: white;
        padding: 5px;
        border-radius: 20px;
        font-size: larger;
      }

      .user-info {
        display: block;
        align-items: center;
      }

      .user-name {
        font: 30px;
      }

      .user-role {
        font-size: 12px;
        color: gray;
      }

      .recent {
        grid-column: 1 / -1;
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-top: 2%;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 14px;
      }

      th {
        background: #1e1e2f;
        text-align: left;
        padding: 10px;
        color: white;
      }
      td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #eee;
      }
      tbody tr:hover {
        background-color: #eef2f7;
      }

      .icon-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 4px;
        margin: 0 3px;
      }

      .icon-btn span {
        font-size: 20px;
        color: #444;
      }

      .icon-btn:hover span {
        color: #1e1e2f;
      }

      .icon-btn.delete:hover span {
        color: red;
      }

      .icon-btn.come:hover span {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="main-panel">
      <!--left side-->
      <div class="sidebar">
        <!--userprofile-->
        <div class="user-profile">
          <img src="Karibu-logo.png" alt="Username" />
        </div>

        <!--Manager options-->
        <div class="Agent-options">
          <ul>
            <li>
              <a href="Karibu_Sales_Agent_DashBoard.html">
                <div class="material-icons">dashboard</div>
                Main DashBoard</a
              >
            </li>

            <li class="active">
              <a href="Karibu_Sales_Agent_Cash-Sales.html"
                ><div class="material-icons">payments</div>
                Cash Sales</a
              >
            </li>

            <li>
              <a href="Karibu_Sales_Agent_CreditSales.html"
                ><div class="material-icons">credit_card</div>
                Credit Sales</a
              >
            </li>
          </ul>
        </div>
      </div>

      <!-- Flexbox and Form  -->

      <header>
        <h2>CASH SALE</h2>
        <input type="text" id="search" placeholder="search items" />
        <div class="user-header">
          <div class="Avatar">SB</div>
          <div class="user-info">
            <div class="user-name">
              <h5 id="employee-name"></h5>
            </div>
            <div class="user-role">Sales Agent</div>
          </div>
        </div>
      </header>

      <div class="Right-panel">
        <!-- Procurement form start -->
        <form class="Form">
          <!-- Supplier Name -->
          <div class="user-details">
            <div class="input-box">
              <label for="Produce_Name">Produce Name</label>
              <select id="Produce_Name" required>
                <option value="">Loading produce...</option>
              </select>
            </div>

            <!--Buyer name -->
            <div class="input-box">
              <label for="Buyer_name"> Buyer Name </label>
              <input
                type="text"
                id="Buyer_name"
                placeholder=" Eg Simon Baraka"
                required
              />
            </div>

            <!--Sales Agent  name  -->
            <div class="input-box">
              <label for="sales_agent"> Sales Agent </label>
              <input
                type="text"
                id="sales_agent"
                placeholder=" Eg Simon Baraka"
                required
              />
            </div>

            <!-- Produce Tonnage -->

            <div class="input-box">
              <label for="produce_Tonnage">Produce Tonnage (Kgs) </label>
              <input
                type="number"
                id="produce_Tonnage"
                placeholder="Eg 1,000 "
                required
              />
            </div>

            <!-- Purchase Date -->
            <div class="input-box">
              <label for="Purchase_Date"> Date/ Time </label>
              <input type="datetime-local" id="Purchase_Date" required />
            </div>

            <!-- Price per Kg -->
            <div class="input-box">
              <label for="price_per_kg">Price per Kg (UGX)</label>
              <input
                type="number"
                id="price_per_kg"
                placeholder="Auto loaded"
                readonly
              />
            </div>

            <!-- Sale Price -->
            <div class="input-box">
              <label for="Amount_Paid">Selling Price (Ugx) </label>
              <input
                type="number"
                id="Amount_Paid"
                placeholder="Auto generated "
                required
              />
            </div>

            <div class="input-box">
              <label for="Branch">Karibu Branch</label>
              <select id="Branch" required>
                <option value="">Select Branch</option>
                <option value="Maganjo">Maganjo</option>
                <option value="Matugga">Matugga</option>
              </select>
            </div>
          </div>

          <!-- Invoice buttons -->

          <button type="submit" id="Invoicebtn">Create Invoice</button>

          <div class="recent">
            <table>
              <h3>Recent Transactions</h3>
              <br />
              <thead>
                <tr>
                  <th>No.</th>
                  <th>Produce</th>
                  <th>Buyer</th>
                  <th>Agent</th>
                  <th>Produce Tonnage</th>
                  <th>Date</th>
                  <th>Amount Paid</th>
                  <th>Branch</th>
                  <th>Price Per Kg</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </form>
      </div>
    </div>

    <script>
      /* ===========================================
   GLOBAL VARIABLES
   =========================================== */

      // Reference to the sales form
      const form = document.querySelector('.Form');

      // Reference to the table body for recent transactions
      let tableBody = document.querySelector('.recent tbody');
      const token = localStorage.getItem('token');
      // Reference to the submit button
      let btn = document.querySelector('#Invoicebtn');

      // Currently editing record ID (null if creating new)
      let editingId = null;
      let AgentBranch = '';
      // API base URL
      const API_URL = 'http://localhost:3000';

      employee_name = document.querySelector('#employee-name');
      function profile() {
        if (!token) {
          alert('Not logged in');
          window.location.href = 'login.html';
          return;
        }

        // Decode JWT payload (middle part) without a library
        const payload = JSON.parse(atob(token.split('.')[1]));

        // Set the manager's name in the header
        employee_name.textContent = payload.firstName + ' ' + payload.lastName;
        document.querySelector('.Avatar').textContent = (
          payload.firstName[0] + payload.lastName[0]
        ).toUpperCase();

        // ✅ Set branch from the logged-in user's own token
        AgentBranch = payload.branch;
        loadAvailableProduce();
        //✅ Auto-select and lock the branch dropdown
        const branchSelect = document.querySelector('#Branch');
        branchSelect.value = AgentBranch;
        branchSelect.disabled = true;

        // Now load the table AFTER branch is set
        loadSales(); // or loadSales() on the sales pages
      }
      profile();

      /* ===========================================
   FORM SUBMISSION: CREATE OR UPDATE CASH SALE
   =========================================== */
      form.addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevent default form submission

        // Gather form data
        let data = {
          Produce_name: document.querySelector('#Produce_Name').value.trim(),
          Buyer_name: document.querySelector('#Buyer_name').value.trim(),
          Agent_name: document.querySelector('#sales_agent').value.trim(),
          Date_time: document.querySelector('#Purchase_Date').value,
          Tonnage: Number(document.querySelector('#produce_Tonnage').value),
          Amount_paid: Number(document.querySelector('#Amount_Paid').value),
          Branch: document.querySelector('#Branch').value,
          Price_per_kg: document.querySelector('#price_per_kg').value,
        };

        /* ========== FORM VALIDATION ========== */

        // Check that all fields are filled
        if (
          !data.Produce_name ||
          !data.Buyer_name ||
          !data.Agent_name ||
          !data.Tonnage ||
          !data.Amount_paid ||
          !data.Date_time ||
          !data.Branch
        ) {
          alert('❌ Fill in all fields');
          return;
        }

        // Additional validation for numeric values
        if (data.Tonnage < 0) {
          alert('❌ Tonnage must be greater than 1,000');
          return;
        }

        if (data.Branch === 'Select Branch') {
          alert('❌ Please select a branch');
          return;
        }
        if (data.Amount_paid < 10_000) {
          alert('❌ Amount paid must be greater than 10,000');
          return;
        }

        try {
          let response;

          // If editingId exists, update existing record
          if (editingId) {
            response = await fetch(`${API_URL}/api/cashsales/${editingId}`, {
              method: 'PATCH',
              headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify(data),
            });
          } else {
            // Otherwise, create a new record
            response = await fetch(`${API_URL}/api/cashsales`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify(data),
            });
          }

          // Parse response JSON
          let result = await response.json();

          if (response.ok) {
            alert('✅ Cash Sale saved successfully');
            console.log('Saved:', result.data);
            form.reset(); // Clear form fields
            editingId = null;
            btn.textContent = 'Create Invoice';
            loadSales(); // Refresh the table
          } else {
            alert('❌ Failed to save: ' + result.message);
          }
        } catch (err) {
          console.error('Error:', err.message);
          alert('❌ Error submitting form');
        }
      });

      /* ========================================
      LOAD PRICE WHEN PRODUCE IS SELECTED
      ======================================== */

      document
        .querySelector('#Produce_Name')
        .addEventListener('change', async function () {
          const produce = this.value;

          if (produce === 'Select Produce') return;

          try {
            const response = await fetch(`${API_URL}/api/prices/${produce}`);

            const result = await response.json();

            if (response.ok) {
              const price = result.data.price;

              document.querySelector('#price_per_kg').value = price;

              calculateTotal();
            } else {
              alert('Price not found for this produce');
            }
          } catch (error) {
            console.error(error);
            alert('Failed to load price');
          }
        });

      document
        .querySelector('#produce_Tonnage')
        .addEventListener('input', calculateTotal);

      function calculateTotal() {
        const tonnage = Number(
          document.querySelector('#produce_Tonnage').value
        );
        const price = Number(document.querySelector('#price_per_kg').value);

        const total = tonnage * price;

        document.querySelector('#Amount_Paid').value = total;
      }

      /* ===========================================
   LOAD CASH SALES INTO TABLE
   =========================================== */
      async function loadSales() {
        try {
          const res = await fetch(`${API_URL}/api/cashsales`, {
            headers: {
              'Content-Type': 'Application/json',
              Authorization: `Bearer ${token}`,
            },
          });
          const result = await res.json();

          const branchData = result.data.filter((item) => {
            const saleDate = new Date(item.Date_time)
              .toISOString()
              .split('T')[0];
            const today = new Date().toISOString().split('T')[0];
            return item.Branch === AgentBranch && saleDate === today;
          });

          let innerHTML1 = '';

          // Loop through each sale record and create a table row
          branchData.forEach((sale, index) => {
            innerHTML1 += `
        <tr>
            <!-- Row number -->
            <td>${index + 1}</td>

            <!-- Sale details -->
            <td>${sale.Produce_name}</td>
            <td>${sale.Buyer_name}</td>
            <td>${sale.Agent_name}</td>
            <td>${sale.Tonnage.toLocaleString()}</td>
            <td>${new Date(sale.Date_time).toISOString().split('T')[0]}</td>
            <td>${sale.Amount_paid.toLocaleString()}</td>
            <td>${sale.Branch}</td>
             <td>${sale.Price_per_kg}</td>

            <!-- Action buttons -->
            <td style="text-align:right;">
              <span>
                <!-- Edit button -->
                <button onclick="Edit_Cash_Sale('${sale._id}')" class="icon-btn come" title="Edit">
                  <span class="material-icons-outlined">edit</span>
                </button>

                <!-- Delete button -->
                <button onclick="Delete_Cash_Sale('${sale._id}')" class="icon-btn delete" title="Delete">
                    <span class="material-icons-outlined">delete</span>
                </button>
              </span>
            </td>
         </tr>
      `;
          });

          // Populate the table body
          tableBody.innerHTML = innerHTML1;
        } catch (err) {
          console.error('Error loading sales:', err);
          alert('❌ Failed to load sales');
        }
      }

      // Load sales on page load

      /* ===========================================
   EDIT CASH SALE
   =========================================== */
      async function Edit_Cash_Sale(Id) {
        try {
          editingId = Id; // Set editing mode
          btn.textContent = 'Update'; // Change button text

          // Fetch the record data
          let response = await fetch(`${API_URL}/api/cashsales/${Id}`, {
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
          });
          let result = await response.json();
          let data = result.data;

          // Populate form with existing values
          document.querySelector('#Produce_Name').value = data.Produce_name;
          document.querySelector('#Buyer_name').value = data.Buyer_name;
          document.querySelector('#sales_agent').value = data.Agent_name;
          document.querySelector('#Purchase_Date').value = new Date(
            data.Date_time
          )
            .toISOString()
            .split('T')[0];
          document.querySelector('#produce_Tonnage').value = data.Tonnage;
          document.querySelector('#Amount_Paid').value = data.Amount_paid;
          document.querySelector('#Branch').value = data.Branch;
        } catch (err) {
          alert('❌ Error fetching sale record');
          console.error(err);
        }
      }

      /* ===========================================
   DELETE CASH SALE
   =========================================== */
      async function Delete_Cash_Sale(Id) {
        const confirmDelete = confirm(
          'Are you sure you want to delete this cash sale record?'
        );
        if (!confirmDelete) return;

        try {
          let response = await fetch(`${API_URL}/api/cashsales/${Id}`, {
            method: 'DELETE',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
          });

          let result = await response.json();

          if (response.ok) {
            alert('✅ Cash Sale deleted successfully');
            loadSales(); // Refresh table after deletion
          } else {
            alert('❌ Failed to delete: ' + result.message);
          }
        } catch (err) {
          console.error('Network error:', err);
          alert('❌ Network error while deleting record');
        }
      }

      async function loadAvailableProduce() {
        try {
          const response = await fetch(`${API_URL}/api/procurement`, {
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
          });

          const result = await response.json();

          const select = document.querySelector('#Produce_Name');
          select.innerHTML = '<option value="">Select Produce</option>';

          // Filter only produce with stock > 0 and matching branch
          const available = result.data.filter(
            (item) => item.Produce_tonnage > 0 && item.Branch === AgentBranch
          );

          if (available.length === 0) {
            select.innerHTML = '<option value="">No produce in stock</option>';
            return;
          }

          available.forEach((item) => {
            const option = document.createElement('option');
            option.value = item.Produce_name;
            option.textContent = `${item.Produce_name} (${item.Produce_tonnage.toLocaleString()} kg available)`;
            select.appendChild(option);
          });
        } catch (err) {
          console.error('Failed to load produce:', err);
          document.querySelector('#Produce_Name').innerHTML =
            '<option value="">Failed to load produce</option>';
        }
      }
    </script>
  </body>
</html>
