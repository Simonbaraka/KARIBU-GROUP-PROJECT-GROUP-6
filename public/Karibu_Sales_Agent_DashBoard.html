<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Agent Dashboard</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }

      body {
        background: #e2e7eb;
      }

      .main-panel {
        display: grid;
        grid-template-columns: 250px 1fr;
        grid-template-rows: 60px 1fr;
        grid-template-areas:
          'sidebar header'
          'sidebar Right-panel';
        height: 100vh;
        gap: 3px;
      }

      .sidebar {
        grid-area: sidebar;
        background: white;
        color: black;
      }

      .user-profile {
        margin: 20px;
        padding: 20px;
        border-radius: 20px;
      }

      img {
        width: 180px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
      }

      .Agent-options {
        font-size: larger;
        padding-top: 40px;
        margin: 10px;
      }

      .Agent-options a {
        text-decoration: none;
        color: black;
      }

      ul {
        list-style: none;
      }

      li {
        padding: 15px;
        box-sizing: border-box;
        margin: 10px 0; /* Only vertical margin between items */
        text-align: left;
        border-bottom: 1px solid rgba(63, 61, 61, 0.2);
        border-radius: 10px;
        cursor: pointer;
      }

      .Agent-options li a {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .Agent-options li.active {
        background-color: rgb(227, 226, 223);
      }
      li:hover {
        background-color: rgb(185, 184, 182);
      }

      header {
        grid-area: header;
        background: white;
        display: flex;
        justify-content: space-between;
        align-items: center;

        border-bottom: 1px solid #ddd;
      }

      #search {
        border: 2.5px solid rgb(128, 209, 143);
        padding: 5px;
        border-radius: 5px;
        width: 25%;
      }

      .Right-panel {
        grid-area: Right-panel;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
        border-radius: 10px;
        margin: 5%;
      }

      .Panel-1 {
        background-color: rgba(255, 255, 255, 0.808);
        border-radius: 5px;
        padding: 25px;
      }

      .Panel-1 h1 {
        text-align: right;
        font-size: 50px;
        color: green;
        font-weight: bolder;
      }

      .recent {
        grid-column: 1 / -1;
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-top: 2%;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 5px;
      }

      th {
        background-color: rgb(77, 192, 77);
        text-align: left;
        padding: 10px;
        border-left: 2px solid #ddd;
      }
      td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #ddd;
        border-left: 2px solid #ddd;
      }

      .user-header {
        display: flex;
        border-radius: 25px;
        padding: 8px 14px;
        gap: 20px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        align-items: center;
      }

      .Avatar {
        background-color: #1e1e2f;
        color: white;
        padding: 5px;
        border-radius: 20px;
        font-size: larger;
      }

      .user-info {
        display: block;
        align-items: center;
      }

      .user-name {
        font: 30px;
      }

      .user-role {
        font-size: 12px;
        color: gray;
      }

      #cash {
        font-size: 400%;
      }

      /*Working on the display area for credit title and its total number*/
      /*Working on the display area for ugx title and its total amount*/
      #cash {
        font-size: 300%;
        text-align: right;
        color: green;
      }

      #cash-title {
        font-size: 200%;
      }

      #ugx_credit {
        font-size: 250%;
        margin-top: 20px;
        text-align: right;
        color: green;
      }

      #ugx {
        font-size: 200%;
        margin-top: 30px;
      }

      /*Working on the display area for ugx title and its total amount*/
      #credit {
        font-size: 300%;
        text-align: right;
        color: green;
      }

      #credit_title {
        font-size: 200%;
      }

      #ugx_cash {
        font-size: 250%;
        margin-top: 20px;
        text-align: right;
        color: green;
      }

      #number {
        font-size: 200%;
        margin-top: 30px;
      }

      .Panel-1 .parameters {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        margin: 0px;
        gap: 5px;
      }
    </style>
  </head>
  <body>
    <div class="main-panel">
      <!--left side-->
      <aside class="sidebar">
        <!--userprofile-->

        <div class="user-profile">
          <img src="Karibu-logo.png" alt="Username" />
        </div>

        <!--Manager options-->
        <div class="Agent-options">
          <ul>
            <li class="active">
              <a href="Karibu_Sales_Agent_DashBoard.html">
                <div class="material-icons">dashboard</div>
                Main DashBoard</a
              >
            </li>

            <li>
              <a href="Karibu_Sales_Agent_Cash-Sales.html"
                ><div class="material-icons">payments</div>
                Cash Sales</a
              >
            </li>

            <li>
              <a href="Karibu_Sales_Agent_CreditSales.html"
                ><div class="material-icons">credit_card</div>
                Credit Sales</a
              >
            </li>

            <li>
              <a href="index.html"
                ><div class="material-icons">logout</div>
                Log Out</a
              >
            </li>
          </ul>
        </div>
      </aside>

      <header>
        <h2>DashBoard</h2>

        <input type="text" id="search" placeholder="search items" />
        <div class="user-header">
          <div class="Avatar">SB</div>
          <div class="user-info">
            <div class="user-name">
              <h5 id="employee-name"></h5>
            </div>
            <div class="user-role">Sales Agent</div>
          </div>
        </div>
      </header>

      <!--Right-panel-->
      <main class="Right-panel">
        <!--Sales  manager panel-->

        <div class="Panel-1">
          <div class="parameters">
            <!--Display area for total cash sales-->
            <h2 id="cash-title">Cash Sales.</h2>
            <h1 id="cash"></h1>

            <!--Display area for total ugx for cash sales-->
            <h2 id="number">UGX.</h2>
            <h2 id="ugx_cash"></h2>
            <h5>Last Updated: <span id="today"></span></h5>
          </div>
        </div>

        <!--Procurement manager panel 0779761960-->
        <div class="Panel-1">
          <div class="parameters">
            <!--Display area for total credit sales-->
            <h2 id="credit_title">Credit Sales.</h2>
            <h2 id="credit"></h2>

            <!--Display area for total ugx for credit sales-->
            <h2 id="ugx">UGX.</h2>
            <h3 id="ugx_credit"></h3>
            <h5>Last Updated: <span id="today"></span></h5>
          </div>
        </div>
      </main>
    </div>

    <script>
      cashArea = document.querySelector('#cash');
      creditArea = document.querySelector('#credit');
      ugxCredit = document.querySelector('#ugx_credit');
      const token = localStorage.getItem('token');
      document.querySelector('#today').textContent =
        new Date().toLocaleDateString();

      ugxCash = document.querySelector('#ugx_cash');
      const API_URL = 'http://localhost:3000';

      employee_name = document.querySelector('#employee-name');
      async function profile() {
        let response = await fetch(`${API_URL}/api/users`, {
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
        });
        let result = await response.json();

        result.data.forEach((user) => {
          if (user.Role.includes('Sales Agent')) {
            employee_name.textContent = user.FirstName + ' ' + user.LastName;
          }
        });
      }
      profile();

      //Regular/cash sales count
      async function RegularSales_Count() {
        let regular_Count = await fetch(`${API_URL}/api/cashsales`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
        });

        let result = await regular_Count.json();

        let today = new Date().toDateString();

        let cash_counter = 0;
        let Total_Regular_sales = 0;

        result.data.forEach((sale) => {
          let saleDate = new Date(sale.createdAt).toDateString();

          if (saleDate === today) {
            Total_Regular_sales++;

            if (sale.Amount_paid) {
              cash_counter += sale.Amount_paid;
            }
          }
        });

        ugxCash.textContent = cash_counter.toLocaleString();
        cashArea.textContent = Total_Regular_sales.toLocaleString();
      }
      RegularSales_Count();

      //Total credit sales count
      async function Credit_Count() {
        let credit_count = await fetch(`${API_URL}/api/creditsales`, {
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
        });

        let result = await credit_count.json();

        let today = new Date().toDateString();

        let count = 0;
        let Total_credit_sales = 0;

        result.data.forEach((sale) => {
          let saleDate = new Date(sale.createdAt).toDateString();

          if (saleDate === today) {
            Total_credit_sales++;

            if (sale.Amount_Due) {
              count += sale.Amount_Due;
            }
          }
        });

        ugxCredit.textContent = count.toLocaleString();
        creditArea.textContent = Total_credit_sales.toLocaleString();
      }

      Credit_Count();
    </script>
  </body>
</html>
